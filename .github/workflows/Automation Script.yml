name: Run R Script Daily

on:
  schedule:
    - cron: '0 0 * * *'  # Runs at midnight UTC every day
  workflow_dispatch:   

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        run: |
          install.packages(c("dplyr", "rebird", "geosphere", "pbapply", "dbscan", "tidygeocoder"), repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - name: Run R script
        run: Rscript API Data Extraction.R

      - name: Commit and push CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add All Observations.csv
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Automated CSV update $(date '+%d/%m/%Y')"
            git push origin main
          fi
