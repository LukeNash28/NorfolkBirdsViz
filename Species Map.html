    'Eurasian Spoonbill,Platalea leucorodia,Titchwell Marsh,2025-03-09,52.9741,0.6013,TRUE',
    'Eurasian Spoonbill,Platalea leucorodia,Brancaster Staithe,2025-03-03,52.9620,0.6400,FALSE',
    'Little Egret,Egretta garzetta,Breydon Water,2025-03-08,52.6078,1.6801,TRUE',
    'Little Egret,Egretta garzetta,Cley Marshes,2025-03-01,52.9571,1.0479,TRUE',
    'Swallowtail Butterfly,Papilio machaon britannicus,Hickling Broad NNR,2025-02-28,52.7408,1.5678,FALSE',
    'Otter,Lutra lutra,Strumpshaw Fen,2025-03-06,52.6134,1.4437,TRUE',
    'Otter,Lutra lutra,River Bure at Horning,2025-02-14,52.7200,1.4800,TRUE',
    'Chinese Water Deer,Hydropotes inermis,Holkham NNR,2025-03-07,52.9700,0.8200,TRUE',
    'Natterjack Toad,Epidalea calamita,Holkham NNR,2025-01-20,52.9700,0.8200,FALSE',
    'Grey Seal,Halichoerus grypus,Blakeney Point,2025-03-09,52.9999,0.9741,TRUE',
    'Grey Seal,Halichoerus grypus,Horsey Beach,2025-03-07,52.7500,1.6500,TRUE',
  ].join('\n');

  /* ── State ─────────────────────────────────────────────────── */
  var allData      = [];
  var speciesIndex = {};   // key: "common|||sci" → array of rows
  var leafMap      = null;
  var markerLayer  = null;
  var activeSpecies = null;
  var ddFocusIdx   = -1;
  var ddItems      = [];

  /* ── Init map (Norfolk centred) ────────────────────────────── */
  function initMap() {
    leafMap = L.map('nsom-map', { zoomControl: true })
               .setView([52.78, 1.00], 9);

    // OpenTopoMap — topographic tile layer
    L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://opentopomap.org">OpenTopoMap</a> (CC-BY-SA) · © <a href="https://openstreetmap.org">OSM</a>',
      maxZoom: 17
    }).addTo(leafMap);

    markerLayer = L.layerGroup().addTo(leafMap);
  }

  /* ── CSV parser ─────────────────────────────────────────────── */
  function parseCSV(txt) {
    var lines = txt.trim().split(/\r?\n/);
    if (lines.length < 2) return [];

    // Detect delimiter
    var d = ',';
    if (lines[0].indexOf('\t') > -1 && lines[0].indexOf(',') === -1) d = '\t';
    else if (lines[0].indexOf(';') > -1 && lines[0].indexOf(',') === -1) d = ';';

    var hdrs = splitLine(lines[0], d).map(function (h) { return h.toLowerCase().trim().replace(/['"]/g,''); });

    function ci(aliases) {
      for (var i = 0; i < aliases.length; i++) {
        var x = hdrs.indexOf(aliases[i]);
        if (x > -1) return x;
      }
      return -1;
    }

    var cni  = ci(['comname']);
    var sci  = ci(['sciname']);
    var sni  = ci(['sitename']);
    var di   = ci(['obsdt']);
    var lati = ci(['sitelat', 'lat']);
    var loni = ci(['sitelng','lon','lng']);
    var vi   = ci(['obsvalid']);

    var rows = [];
    for (var i = 1; i < lines.length; i++) {
      var line = lines[i].trim();
      if (!line) continue;
      var c = splitLine(line, d);
      var lat = parseFloat(c[lati]);
      var lon = parseFloat(c[loni]);
      if (isNaN(lat) || isNaN(lon)) continue;
      var commonName = clean(c[cni]);
      var sciName    = clean(c[sci]);
      if (!commonName && !sciName) continue;
      var rawDate    = di > -1 ? clean(c[di]) : '';
      rows.push({
        common:   commonName,
        sci:      sciName,
        site:     sni  > -1 ? clean(c[sni]) : '',
        date:     formatDate(rawDate),
        lat:      lat,
        lon:      lon,
        valid:    vi > -1 ? /^(true|yes|1|confirmed)$/i.test(clean(c[vi])) : true
      });
    }
    return rows;
  }

  function clean(v) {
    if (v === undefined || v === null) return '';
    return String(v).trim().replace(/^["']|["']$/g, '');
  }

  function splitLine(line, d) {
    var r = [], cur = '', q = false;
    for (var i = 0; i < line.length; i++) {
      var ch = line[i];
      if (ch === '"') { q = !q; }
      else if (ch === d && !q) { r.push(cur); cur = ''; }
      else { cur += ch; }
    }
    r.push(cur);
    return r;
  }

  /* ── Date formatter → DD/MM/YYYY ───────────────────────────── */
  function formatDate(str) {
    if (!str) return '';
    // Try parsing various formats
    var d = new Date(str);
    // Also handle DD/MM/YYYY input explicitly
    var dmyMatch = str.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})$/);
    if (dmyMatch) {
      var day = parseInt(dmyMatch[1],10);
      var mon = parseInt(dmyMatch[2],10);
      var yr  = parseInt(dmyMatch[3],10);
      // Ambiguous — assume DD/MM/YYYY if day ≤ 12 and mon ≤ 12
      // We'll trust the user's format; if year < 100 adjust
      if (yr < 100) yr += 2000;
      d = new Date(yr, mon - 1, day);
    }
    if (isNaN(d.getTime())) return str; // return raw if unparseable
    var dd  = String(d.getDate()).padStart(2,'0');
    var mm  = String(d.getMonth()+1).padStart(2,'0');
    var yy  = d.getFullYear();
    return dd + '/' + mm + '/' + yy;
  }

  /* ── Build species index ────────────────────────────────────── */
  function buildIndex(data) {
    speciesIndex = {};
    data.forEach(function (r) {
      var key = r.common + '|||' + r.sci;
      if (!speciesIndex[key]) {
        speciesIndex[key] = { common: r.common, sci: r.sci, rows: [] };
      }
      speciesIndex[key].rows.push(r);
    });
  }

  /* ── 30-day site count ──────────────────────────────────────── */
  function recentSiteCount(rows) {
    var cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - 30);
    var sites = {};
    rows.forEach(function (r) {
      // Parse back from DD/MM/YYYY
      var parts = r.date.split('/');
      if (parts.length === 3) {
        var d = new Date(parseInt(parts[2],10), parseInt(parts[1],10)-1, parseInt(parts[0],10));
        if (!isNaN(d.getTime()) && d >= cutoff) {
          sites[r.site || (r.lat+','+r.lon)] = true;
        }
      }
    });
    return Object.keys(sites).length;
  }

  /* ── Render markers for a species ──────────────────────────── */
  function renderSpecies(key) {
    markerLayer.clearLayers();
    if (!key || !speciesIndex[key]) return;
    activeSpecies = key;
    var entry = speciesIndex[key];

    entry.rows.forEach(function (r) {
      var color = r.valid ? '#2e7d32' : '#c8692a';
      var border = r.valid ? 'rgba(20,80,20,0.3)' : 'rgba(140,60,0,0.3)';
      var icon = L.divIcon({
        className: '',
        html: '<div style="width:14px;height:14px;border-radius:50%;background:'
              + color + ';border:2.5px solid #fff;outline:2px solid '
              + border + ';box-shadow:0 2px 6px rgba(0,0,0,0.28);cursor:pointer"></div>',
        iconSize: [14, 14],
        iconAnchor: [7, 7]
      });
      L.marker([r.lat, r.lon], { icon: icon })
       .bindPopup(buildPopup(r), { maxWidth: 280 })
       .addTo(markerLayer);
    });

    // Fit bounds
    var lats = entry.rows.map(function(r){return r.lat;});
    var lons  = entry.rows.map(function(r){return r.lon;});
    if (entry.rows.length === 1) {
      leafMap.setView([lats[0], lons[0]], 12);
    } else {
      leafMap.fitBounds([
        [Math.min.apply(null,lats), Math.min.apply(null,lons)],
        [Math.max.apply(null,lats), Math.max.apply(null,lons)]
      ], { padding: [50, 50] });
    }

    // Update ticker
    var cnt = recentSiteCount(entry.rows);
    document.getElementById('n-ticker-count').textContent = cnt;
    document.getElementById('n-ticker').style.display = 'block';
  }

  /* ── Build popup ────────────────────────────────────────────── */
  function buildPopup(r) {
    var statusClass = r.valid ? 'confirmed' : 'unconfirmed';
    var statusLabel = r.valid ? '● Confirmed' : '● Unconfirmed';
    return '<div class="n-popup">'
      + '<div class="n-popup-site">' + esc(r.site || 'Unknown site') + '</div>'
      + '<div class="n-popup-body">'
      + '<div class="n-popup-common">' + esc(r.common) + '</div>'
      + '<div class="n-popup-sci">' + esc(r.sci) + '</div>'
      + (r.date ? '<div class="n-popup-row"><span class="n-popup-key">Last seen</span><span class="n-popup-val">' + esc(r.date) + '</span></div>' : '')
      + '<div class="n-popup-row" style="margin-top:8px">'
      + '<span class="n-popup-badge ' + statusClass + '">' + statusLabel + '</span>'
      + '</div>'
      + '</div></div>';
  }

  /* ── Autocomplete ───────────────────────────────────────────── */
  var searchInput = document.getElementById('n-search-input');
  var dropdown    = document.getElementById('n-dropdown');
  var clearBtn    = document.getElementById('n-clear-btn');

  function getSpeciesList() {
    return Object.keys(speciesIndex).map(function(k){
      return speciesIndex[k];
    }).sort(function(a,b){ return a.common.localeCompare(b.common); });
  }

  function highlight(text, query) {
    if (!query) return esc(text);
    var re = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
    return esc(text).replace(re, '<mark>$1</mark>');
  }

  function showDropdown(query) {
    var q = query.trim().toLowerCase();
    if (!q) { hideDropdown(); return; }

    var all = getSpeciesList();
    var matches = all.filter(function(s){
      return s.common.toLowerCase().indexOf(q) > -1
          || s.sci.toLowerCase().indexOf(q) > -1;
    }).slice(0, 40);

    dropdown.innerHTML = '';
    ddFocusIdx = -1;

    if (matches.length === 0) {
      dropdown.innerHTML = '<div class="n-dd-none">No species found matching "' + esc(query) + '"</div>';
      dropdown.style.display = 'block';
      ddItems = [];
      return;
    }

    ddItems = matches;
    matches.forEach(function(s, i) {
      var div = document.createElement('div');
      div.className = 'n-dd-item';
      div.innerHTML = '<span class="n-dd-common">' + highlight(s.common, query) + '</span>'
                    + '<span class="n-dd-sci">' + highlight(s.sci, query) + '</span>';
      div.addEventListener('mousedown', function(e){
        e.preventDefault(); // prevent blur
        selectSpecies(s);
      });
      dropdown.appendChild(div);
    });

    dropdown.style.display = 'block';
  }

  function hideDropdown() {
    dropdown.style.display = 'none';
    ddItems = [];
    ddFocusIdx = -1;
  }

  function selectSpecies(s) {
    searchInput.value = s.common + ' — ' + s.sci;
    hideDropdown();
    clearBtn.style.display = 'block';
    var key = s.common + '|||' + s.sci;
    renderSpecies(key);
  }

  searchInput.addEventListener('input', function(){
    clearBtn.style.display = this.value ? 'block' : 'none';
    showDropdown(this.value);
  });

  searchInput.addEventListener('keydown', function(e){
    var items = dropdown.querySelectorAll('.n-dd-item');
    if (!items.length) return;
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      ddFocusIdx = Math.min(ddFocusIdx + 1, items.length - 1);
      items.forEach(function(el,i){ el.classList.toggle('focused', i === ddFocusIdx); });
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      ddFocusIdx = Math.max(ddFocusIdx - 1, 0);
      items.forEach(function(el,i){ el.classList.toggle('focused', i === ddFocusIdx); });
    } else if (e.key === 'Enter' && ddFocusIdx > -1) {
      e.preventDefault();
      selectSpecies(ddItems[ddFocusIdx]);
    } else if (e.key === 'Escape') {
      hideDropdown();
    }
  });

  searchInput.addEventListener('blur', function(){ setTimeout(hideDropdown, 150); });

  clearBtn.addEventListener('click', function(){
    searchInput.value = '';
    clearBtn.style.display = 'none';
    hideDropdown();
    markerLayer.clearLayers();
    activeSpecies = null;
    document.getElementById('n-ticker').style.display = 'none';
    leafMap.setView([52.78, 1.00], 9);
  });

  /* ── Escape HTML ────────────────────────────────────────────── */
  function esc(s) {
    return String(s||'')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── Data loading ───────────────────────────────────────────── */
  function onData(csvText) {
    allData = parseCSV(csvText);
    buildIndex(allData);
  }

  function loadData() {
    if (typeof CSV_URL === 'undefined' || !CSV_URL) {
      onData(SAMPLE_CSV);
      return;
    }
    fetch(CSV_URL)
      .then(function(r){ return r.text(); })
      .then(onData)
      .catch(function(err){
        console.warn('Species map: could not load CSV from', CSV_URL, err);
        onData(SAMPLE_CSV); // fallback to sample
      });
  }

  /* ── Boot ───────────────────────────────────────────────────── */
  initMap();
  loadData();

})();
</script>
